apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-app-deployment
  labels:
    app: local-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: local-app
  template:
    metadata:
      labels:
        app: local-app
    spec:
      containers:
      - name: app-container
        image: local-app:latest 
        imagePullPolicy: Never # Use the locally built image
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: local-app-service
spec:
  type: NodePort
  selector:
    app: local-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080 # Ezen a porton érjük el a saját gépünkről